version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Materialise runtime-needed env vars into .env.production so the SSR
        # Lambda actually sees them. Amplify Hosting exposes env vars at build
        # time only; this is the documented escape hatch.
        - |
          touch .env.production
          for var in \
            SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS SMTP_FROM_EMAIL \
            ADMIN_PASSWORD ADMIN_SESSION_SECRET ADMIN_NOTIFY_EMAIL \
            IP_HASH_SALT \
            NEXT_PUBLIC_CONVEX_URL CONVEX_DEPLOYMENT \
            NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION; do
            val=$(printenv "$var" || true)
            if [ -n "$val" ]; then
              printf '%s=%s\n' "$var" "$val" >> .env.production
            fi
          done
          echo "Wrote $(wc -l < .env.production) runtime env vars into .env.production"
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Auto-format pre-existing files before next build's lint runs;
        # legacy components (FaqAccordion, faq-schema, etc.) still trip
        # prettier rules we haven't fixed. Mirrors the original build spec.
        - npx prettier --write .
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
